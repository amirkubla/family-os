# .maestro/add-chore.yaml — iOS
# Run: maestro test -p iOS -e QA_EMAIL="$QA_EMAIL" -e QA_PASSWORD="$QA_PASSWORD" .maestro/add-chore.yaml
appId: com.amirkubla.familyos
---
# 1. Start fresh
- launchApp:
    clearKeychain: true

- runFlow:
    when:
      visible:
        text: "Open"
    commands:
      - tapOn:
          text: "Open"
- waitForAnimationToEnd

# 2. Login
- extendedWaitUntil:
    visible:
      id: "input-email"
    timeout: 30000
- tapOn:
    id: "input-email"
- inputText: ${QA_EMAIL}
- tapOn:
    id: "input-password"
- inputText: ${QA_PASSWORD}
- pressKey: Enter
- runFlow:
    when:
      visible:
        text: "Not Now"
    commands:
      - tapOn:
          text: "Not Now"
- extendedWaitUntil:
    visible:
      id: "tab-today"
    timeout: 30000

# 3. Deep-link directly to Home with chore modal open
# ?modal=chore bypasses the RTL tap issue: no physical button tap needed
- openLink: "familyos://home?modal=chore"
- runFlow:
    when:
      visible:
        text: "Open"
    commands:
      - tapOn:
          text: "Open"
- waitForAnimationToEnd

# 4. Modal is open — fill and submit
- extendedWaitUntil:
    visible:
      id: "input-chore-title"
    timeout: 8000
- tapOn:
    id: "input-chore-title"
- inputText: "QA Chore"
- pressKey: Enter   # triggers onSubmitEditing → handleSubmit
- waitForAnimationToEnd

# 5. Scroll down twice to reveal chores section (Kids > Notes > Chores is the order)
- scroll
- scroll

# 6. Mark chore done — row is now visible
- tapOn:
    id: "chore-check-QA Chore"
- waitForAnimationToEnd

# 7. Delete chore
- tapOn:
    id: "chore-delete-QA Chore"
- waitForAnimationToEnd
- tapOn:
    text: "מחק"
- waitForAnimationToEnd

# 8. Assert chore gone (text no longer visible on screen)
- assertNotVisible:
    text: "QA Chore"

- takeScreenshot: qa-reports/screenshots/add-chore
