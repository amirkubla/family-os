# .maestro/add-family-member.yaml
# Run with:
#   iOS:     maestro test -p iOS     -e QA_EMAIL="$QA_EMAIL"         -e QA_PASSWORD="$QA_PASSWORD"         .maestro/add-family-member.yaml
#   Android: maestro test -p Android -e QA_EMAIL="$QA_ANDROID_EMAIL" -e QA_PASSWORD="$QA_ANDROID_PASSWORD" .maestro/add-family-member.yaml
#
# Tab-bar navigation is unreliable under Maestro on both platforms (RTL coordinate
# flip under XCUITest/UIAutomator). Settings is reached via deep link instead.
appId: com.amirkubla.familyos
---
# 1. Start fresh — clear keychain; handle Android "still logged in" case
- launchApp:
    clearKeychain: true

- runFlow:
    when:
      visible:
        text: "Open"
    commands:
      - tapOn:
          text: "Open"
- waitForAnimationToEnd

# Android: if still logged in, log out via Settings deep link first
- runFlow:
    when:
      visible:
        id: "roster-screen"
    commands:
      - openLink: "familyos://settings"
      - runFlow:
          when:
            visible:
              text: "Open"
          commands:
            - tapOn:
                text: "Open"
      - waitForAnimationToEnd
      - scroll
      - tapOn:
          id: "logout-button"
      - waitForAnimationToEnd

# 2. Login
- extendedWaitUntil:
    visible:
      id: "input-email"
    timeout: 30000
- tapOn:
    id: "input-email"
- inputText: ${QA_EMAIL}
- tapOn:
    id: "input-password"
- inputText: ${QA_PASSWORD}
- pressKey: Enter
- runFlow:
    when:
      visible:
        text: "Not Now"
    commands:
      - tapOn:
          text: "Not Now"
- extendedWaitUntil:
    visible:
      id: "tab-today"
    timeout: 30000

# 3. Navigate to Settings via deep link
- openLink: "familyos://settings"
- runFlow:
    when:
      visible:
        text: "Open"
    commands:
      - tapOn:
          text: "Open"
- waitForAnimationToEnd

# 4. Add a family member
- tapOn:
    id: "btn-add-member"
- tapOn:
    id: "input-member-name"
- inputText: "QA Member"
- pressKey: Enter    # triggers onSubmitEditing → handleSubmit, dismisses keyboard + saves
- waitForAnimationToEnd

# 5. Assert new member in roster
- assertVisible:
    id: "member-row-QA Member"
- takeScreenshot: qa-reports/screenshots/add-family-member
