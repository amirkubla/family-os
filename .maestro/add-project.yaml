# .maestro/add-project.yaml — iOS
# Run: maestro test -p iOS -e QA_EMAIL="$QA_EMAIL" -e QA_PASSWORD="$QA_PASSWORD" .maestro/add-project.yaml
appId: com.amirkubla.familyos
---
# 1. Start fresh
- launchApp:
    clearKeychain: true

- runFlow:
    when:
      visible:
        text: "Open"
    commands:
      - tapOn:
          text: "Open"
- waitForAnimationToEnd

# 2. Login
- extendedWaitUntil:
    visible:
      id: "input-email"
    timeout: 30000
- tapOn:
    id: "input-email"
- inputText: ${QA_EMAIL}
- tapOn:
    id: "input-password"
- inputText: ${QA_PASSWORD}
- pressKey: Enter
- runFlow:
    when:
      visible:
        text: "Not Now"
    commands:
      - tapOn:
          text: "Not Now"
- extendedWaitUntil:
    visible:
      id: "tab-today"
    timeout: 30000

# 3. Deep-link directly to Home with project modal open
- openLink: "familyos://home?modal=project"
- runFlow:
    when:
      visible:
        text: "Open"
    commands:
      - tapOn:
          text: "Open"
- waitForAnimationToEnd

# 4. Modal is open — fill and submit
- extendedWaitUntil:
    visible:
      id: "input-project-title"
    timeout: 8000
- tapOn:
    id: "input-project-title"
- inputText: "QA Project"
- pressKey: Enter   # triggers onSubmitEditing → handleSubmit
- waitForAnimationToEnd

# 5. Scroll down to reveal projects section (Kids > Notes > Chores > Projects)
- scroll
- scroll
- scroll

# 6. Delete project — card is now visible
- tapOn:
    id: "project-delete-QA Project"
- waitForAnimationToEnd
- tapOn:
    text: "מחק"
- waitForAnimationToEnd

# 7. Assert project gone
- assertNotVisible:
    text: "QA Project"

- takeScreenshot: qa-reports/screenshots/add-project
