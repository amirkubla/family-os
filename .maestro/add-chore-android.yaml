# .maestro/add-chore-android.yaml — Android only
# Pre-requisite: adb reverse tcp:8081 tcp:8081
appId: com.amirkubla.familyos
---
# NOTE: Do NOT use launchApp — it kills the app on Android, breaking the Metro URL.
# The app must already be running. Start this flow with openLink to navigate.

# 1. Logout then login (app must already be running; no launchApp needed)
# Navigate to Settings via deep link
- openLink: "familyos://settings"
# Wait for Settings screen to confirm navigation completed
- extendedWaitUntil:
    visible:
      text: "הגדרות"
    timeout: 15000
- scrollUntilVisible:
    element:
      text: "התנתק"
    direction: DOWN
- tapOn:
    text: "התנתק"
- waitForAnimationToEnd

# 2. Login
- extendedWaitUntil:
    visible:
      id: "input-email"
    timeout: 20000
- tapOn:
    id: "input-email"
- inputText: ${QA_EMAIL}
- tapOn:
    id: "input-password"
- inputText: ${QA_PASSWORD}
- pressKey: Enter
- extendedWaitUntil:
    visible:
      text: "היום"
    timeout: 30000

# 3. Navigate to Home
- openLink: "familyos://home"
- waitForAnimationToEnd

# 4. Add chore
- tapOn:
    id: "btn-add-chore"
- waitForAnimationToEnd
- tapOn:
    id: "input-chore-title"
- inputText: "QA Chore"
- tapOn:
    id: "btn-save"
- waitForAnimationToEnd

# 5. Assert chore visible
- assertVisible:
    id: "chore-row-QA Chore"

# 6. Mark chore done
- tapOn:
    id: "chore-check-QA Chore"
- waitForAnimationToEnd

# 7. Delete chore
- tapOn:
    id: "chore-delete-QA Chore"
- waitForAnimationToEnd
- tapOn:
    text: "מחק"
- waitForAnimationToEnd

# 8. Assert chore gone
- assertNotVisible:
    id: "chore-row-QA Chore"

- takeScreenshot: qa-reports/screenshots/add-chore
